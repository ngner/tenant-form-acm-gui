---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.dusty-seahorse.io
spec:
  group: dusty-seahorse.io
  names:
    kind: Tenant
    listKind: TenantList
    plural: tenants
    singular: tenant
    shortNames:
      - tn
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            status:
              type: object
              properties:
                identity:
                  type: object
                  properties:
                    phase:
                      type: string
                      description: Pending, Ready, PendingExternalSetup, or Error.
                    idpName:
                      type: string
                    callbackURL:
                      type: string
                    issuer:
                      type: string
                    clientId:
                      type: string
                    message:
                      type: string
                    externalSetupNotes:
                      type: array
                      items:
                        type: string
            spec:
              type: object
              required:
                - adminGroup
                - userGroup
              properties:
                # -----------------------------------------------------------
                # Identity & RBAC
                # -----------------------------------------------------------
                displayName:
                  type: string
                  description: Human-readable tenant name shown in the console.
                owner:
                  type: string
                  description: Contact email or team identifier for the tenant owner.
                adminGroup:
                  type: string
                  description: >-
                    Tenant-Admin IdP group — granted admin in the tenant
                    namespace, kubevirt.io:admin on VMs, and
                    acm-vm-fleet:view on the hub console.
                    Default naming convention: {tenantname}-tenant-admin.
                userGroup:
                  type: string
                  description: >-
                    Tenant-User IdP group — granted edit in the tenant
                    namespace, kubevirt.io:edit on VMs, and
                    acm-vm-fleet:view on the hub console.
                    Default naming convention: {tenantname}-tenant-user.
                viewerGroup:
                  type: string
                  description: >-
                    Tenant-Viewer IdP group — granted view in the tenant
                    namespace, kubevirt.io:view on VMs, and
                    acm-vm-fleet:view on the hub console.
                    Default naming convention: {tenantname}-tenant-viewer.

                # -----------------------------------------------------------
                # Optional console SSO (OpenShift OAuth IdP)
                # -----------------------------------------------------------
                identity:
                  type: object
                  description: >-
                    Optional OpenShift console login integration. When enabled,
                    policies provision Keycloak realms (provider=keycloak) or
                    register external OIDC IdPs and surface setup notes in status.
                  properties:
                    enabled:
                      type: boolean
                      default: false
                      description: Enable console SSO for this tenant.
                    provider:
                      type: string
                      enum:
                        - keycloak
                        - oidc
                      description: keycloak = platform-managed realm; oidc = external IdP (Azure, etc.).
                    consoleLoginName:
                      type: string
                      description: OpenShift OAuth identity provider name. Defaults to {tenant}-idp.
                    clientId:
                      type: string
                      description: OIDC client ID. Defaults to openshift-{tenant}.
                    clientSecretRef:
                      type: object
                      description: Secret holding the OIDC client secret (openshift-config).
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                          default: openshift-config
                      required:
                        - name
                    keycloak:
                      type: object
                      description: Keycloak options when provider is keycloak.
                      properties:
                        namespace:
                          type: string
                          default: keycloak-system
                          description: Namespace of the Keycloak CR (must already exist).
                        instanceName:
                          type: string
                          default: main
                          description: Keycloak CR name (keycloakCRName).
                        realm:
                          type: string
                          description: Existing realm name for OAuth issuer. Defaults to tenant name.
                        manageRealm:
                          type: boolean
                          default: false
                          description: >-
                            When true, create/update a KeycloakRealmImport for this tenant.
                            Leave false when the realm already exists (typical production).
                        seedUsers:
                          type: boolean
                          default: false
                          description: >-
                            When manageRealm is true, create admin@/user@/viewer@ demo users.
                            Workshop use only — not for production.
                        loginTheme:
                          type: string
                          description: >-
                            Optional login theme on managed realms. Demo workshops only;
                            custom CSS themes are applied outside policy (apply-themes.sh).
                    oidc:
                      type: object
                      description: External OIDC settings when provider is oidc.
                      properties:
                        issuer:
                          type: string
                          description: Issuer URL (e.g. Azure AD v2 endpoint).
                        claims:
                          type: object
                          additionalProperties:
                            type: string
                          description: Claim mappings (groups, preferredUsername, name, email).

                # -----------------------------------------------------------
                # ResourceQuota — namespace totals (all pods + PVCs)
                # -----------------------------------------------------------
                resourceQuota:
                  type: object
                  description: >-
                    Namespace-wide resource caps applied via ResourceQuota.
                    Covers all pods (VM + non-VM) and PVC storage.
                  properties:
                    cpu:
                      type: string
                      default: "86"
                      description: Total CPU requests allowed for all pods.
                    memory:
                      type: string
                      default: "332Gi"
                      description: Total memory requests allowed for all pods.
                    pods:
                      type: string
                      default: "15"
                      description: Maximum pod count in the namespace.
                    storage:
                      type: string
                      default: "2000Gi"
                      description: Total PVC storage requests allowed.

                # -----------------------------------------------------------
                # ApplicationAwareResourceQuota — VM workload totals (AAQ)
                # -----------------------------------------------------------
                vmQuota:
                  type: object
                  description: >-
                    VM-specific resource caps applied via
                    ApplicationAwareResourceQuota (/vmi counters).
                  properties:
                    cpu:
                      type: string
                      default: "80"
                      description: Aggregate vCPU across all VMIs.
                    memory:
                      type: string
                      default: "320Gi"
                      description: Aggregate memory across all VMIs.

                # -----------------------------------------------------------
                # LimitRange — per-object maximums
                # -----------------------------------------------------------
                limitRange:
                  type: object
                  description: >-
                    Per-object ceilings applied via LimitRange. No defaults
                    or minimums — workloads must declare their own requests.
                  properties:
                    maxCpu:
                      type: string
                      default: "32"
                      description: Maximum CPU any single container may request.
                    maxMemory:
                      type: string
                      default: "128Gi"
                      description: Maximum memory any single container may request.
                    maxStorage:
                      type: string
                      default: "1Ti"
                      description: Maximum size of any single PVC.

                # -----------------------------------------------------------
                # Network — UDN + MetalLB BGP/VRF
                # -----------------------------------------------------------
                network:
                  type: object
                  description: >-
                    Network configuration for the tenant's isolated
                    UserDefinedNetwork and optional MetalLB BGP peering.
                  properties:
                    udnSubnet:
                      type: string
                      description: >-
                        CIDR for the tenant's primary UDN. May overlap other
                        tenants — each UDN is a fully isolated logical network.
                    metallb:
                      type: object
                      description: >-
                        Optional MetalLB BGP configuration. Omit entirely if
                        the tenant does not need external BGP connectivity.
                      properties:
                        myASN:
                          type: integer
                          default: 64500
                          description: Cluster-side ASN (shared across tenants by default).
                        peerASN:
                          type: integer
                          description: ASN of the upstream BGP router for this tenant.
                        peerAddress:
                          type: string
                          description: IP address of the upstream BGP peer.
                        vrf:
                          type: string
                          description: Dedicated VRF name (e.g. starwars-vrf).
                        addresses:
                          type: array
                          description: External IP ranges assigned to this tenant's services.
                          items:
                            type: string
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: Admin Group
          type: string
          jsonPath: .spec.adminGroup
        - name: User Group
          type: string
          jsonPath: .spec.userGroup
        - name: Viewer Group
          type: string
          jsonPath: .spec.viewerGroup
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
