---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-form-acm-gui
  namespace: tenant-form-acm-gui
  labels:
    app: tenant-form-acm-gui
    app.kubernetes.io/part-of: tenant-form-acm-gui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-form-acm-gui
  template:
    metadata:
      labels:
        app: tenant-form-acm-gui
    spec:
      volumes:
        - name: serving-cert
          secret:
            secretName: tenant-form-acm-gui-cert
            defaultMode: 420
      containers:
        - name: tenant-form-acm-gui
          image: quay.io/nday/tenant-form-acm-gui:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: https
              containerPort: 9443
              protocol: TCP
          volumeMounts:
            - name: serving-cert
              mountPath: /var/serving-cert
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /plugin-manifest.json
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /plugin-manifest.json
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-form-acm-gui
  namespace: tenant-form-acm-gui
  labels:
    app: tenant-form-acm-gui
    app.kubernetes.io/part-of: tenant-form-acm-gui
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: tenant-form-acm-gui-cert
spec:
  selector:
    app: tenant-form-acm-gui
  ports:
    - port: 9443
      targetPort: 9443
      protocol: TCP
